# ---------------------------------------------------------------------------
# format/global_heap.rs — H5HG*.c
# ---------------------------------------------------------------------------
# `H5HG__cache_heap_deserialize` does prefix decode + object-table walk
# in one C function. Rust splits those into `decode_header` + `walk_objects`,
# so the canonical mapping for the C function lives on the *composer*
# (`read_at`), which does the same combined work. The two Rust halves
# are intentionally unmapped — they're the structural split, not the
# semantic match. (Mapping `decode_header` to the C function would put a
# 30-line prefix parser side-by-side with libhdf5's full deserializer in
# the TUI, which is misleading.)
[[entries]]
rust = "read_at"
rust_path = "format/global_heap.rs"
other = "H5HG__cache_heap_deserialize"

[[entries]]
rust = "read_global_heap_object"
rust_path = "format/global_heap.rs"
other = "H5HG_read"

[[entries]]
rust = "heap_object_len"
rust_path = "format/global_heap.rs"
other = "H5HG_get_obj_size"

