# Rust ↔ C function name mapping for ccc-rs cross-language compare.
#
# Used with:
#   ccc-rs compare hdf5_rust.json hdf5_c.json --mapping ccc_mapping.toml
#   ccc-rs missing hdf5_rust.json hdf5_c.json --mapping ccc_mapping.toml
#   ccc-rs constants-diff hdf5_rust.json hdf5_c.json --mapping ccc_mapping.toml
#
# Mapping rules:
# - "rust"       — Rust function name as ccc-rs sees it (no module path).
# - "rust_path"  — optional path-suffix constraint on the Rust source file,
#                  used to disambiguate names that appear in multiple modules.
# - "other"      — upstream C symbol from hdf5/src/H5*.c.
# - "other_path" — optional path-suffix constraint on the C source file.
# - Pure Rust helpers with no C analog (read_u32, ensure_available, finalize,
#   etc.) are intentionally omitted.

# ---------------------------------------------------------------------------
# format/checksum.rs — H5checksum.c (Jenkins lookup3, metadata checksum)
# ---------------------------------------------------------------------------
[[entries]]
rust = "checksum_lookup3"
rust_path = "format/checksum.rs"
other = "H5_checksum_lookup3"

[[entries]]
rust = "checksum_metadata"
rust_path = "format/checksum.rs"
other = "H5_checksum_metadata"

