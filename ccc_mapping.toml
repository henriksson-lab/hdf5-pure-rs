rust = "collect_btree_v1_chunks"
rust_path = "hl/dataset.rs"
other = "H5D__btree_idx_iterate"

# `decode_virtual_hyperslab_selection` is intentionally unmapped under strict
# 1:1 matching. The Rust path keeps hyperslab header, regular selection, and
# irregular selection decoding split across helpers instead of mirroring the
# large monolithic C deserializer.

# `H5S__point_deserialize` is intentionally unmapped under strict 1:1 matching.
# The Rust point-selection decode path is split across version, encoding-size,
# rank, and coordinate materialization helpers instead of one monolithic C body.

# `decode_virtual_mappings` is intentionally unmapped under strict 1:1
# matching. The Rust VDS layout load path is split across heap-record decode,
# shared-name resolution, and selection decode helpers, instead of one large C
# function body.

# `copy_chunk_nd` is intentionally unmapped under strict 1:1 matching. The
# Rust implementation is only the N-D in-memory scatter helper, while the C
# `H5D__chunk_copy` routine is a larger chunk-engine copy path with broader
# orchestration responsibilities.

# Per-chunk-index-type readers — each maps to libhdf5's iterate path on
# the matching chunk index module. `rust_class` pins the methods to the
# `Dataset` impl since they share names with no other type today, but
# the explicit class binding documents the intent and keeps the mapping
# stable if the methods get extracted to a free function later.
