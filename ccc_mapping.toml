# --- Pure deserialize halves (the cleanest 1:1 mappings post-refactor) ---
# Mirrors libhdf5 `H5HF__cache_iblock_deserialize` byte-for-byte: parses
# the FHIB prefix and the child-pointer table, no traversal.
[[entries]]
rust = "decode_indirect_block"
rust_path = "format/fractal_heap/iblock.rs"
other = "H5HF__cache_iblock_deserialize"

# NB: `decode_filtered_indirect_block` semantically corresponds to the
# same C target (`H5HF__cache_iblock_deserialize`, which handles both
# filtered and unfiltered iblocks internally), but ccc-rs's mapping pass
# can only bind each C function once. We leave the filtered variant
# unmapped — fingerprint matching will best-effort-pair it instead.

# --- Traversal halves left unmapped on purpose ---
# `lookup_in_indirect_block` and `lookup_in_filtered_indirect_block`
# correspond to the search loop *inside* `H5HF__man_op_real`, which the
# C side does not expose as a separate function. Mapping them collides
# with `read_managed` (which already owns `H5HF__man_op_real`), so they
# stay unmapped and fall through to fingerprint matching.
#
# `read_from_indirect_block_rows` and `read_from_filtered_indirect_block`
# are now thin compose-only wrappers (`decode_*` then `lookup_in_*`) and
# don't have a single C analog. Also intentionally unmapped.

